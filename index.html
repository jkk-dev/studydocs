<!DOCTYPE html>
<html>

<head>
    <title>StudyDocs</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;

            /* clean dark gradient */
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a, #000);

            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .container {
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            font-weight: 300;
            color: #ccc;
            margin-bottom: 35px;
        }

        button {
            font-family: 'Poppins', sans-serif;
            padding: 14px 32px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #6366f1;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #4f46e5;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>StudyDocs</h1>
        <p>StudyDocs is a library of notes and resources to learn from.</p>
        <button onclick="window.location.href='subjects.html'">Start Learning</button>
    </div>

</body>

</html>
