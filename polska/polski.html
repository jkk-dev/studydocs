<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polski - StudyDocs</title>
    <link rel="stylesheet" href="../styles.css?v=reading-page-fix-9">
</head>

<body class="study-page subject-polish-page">
    <div class="study-scene" aria-hidden="true"></div>
<header class="shell topbar">
        <a class="brand" href="../index.html" aria-label="StudyDocs"><span class="brand-mark">SD</span><span>StudyDocs</span></a>
        <button class="language-toggle" type="button" title="EN / PL" aria-label="Switch language">
            <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><rect x="3" y="2" width="10" height="2" fill="#f0e6c8"/><rect x="2" y="4" width="12" height="8" fill="#f0e6c8"/><rect x="3" y="12" width="10" height="2" fill="#f0e6c8"/><rect x="4" y="5" width="8" height="1" fill="#2a1f14"/><rect x="4" y="10" width="8" height="1" fill="#2a1f14"/><rect x="7" y="3" width="2" height="10" fill="#2a1f14"/><rect x="2" y="7" width="12" height="2" fill="#2a1f14"/><rect x="1" y="5" width="2" height="6" fill="#f5c842"/><rect x="13" y="5" width="2" height="6" fill="#f5c842"/></svg>
        </button>
    </header>

    <div class="study-layout">
        <aside class="sidebar">
            <div class="sidebar-head">
                <a class="back-link" href="../subjects.html">Wróć</a>
                <h1 class="subject-title">Polski</h1>
            </div>

            <nav class="menu" aria-label="Działy z języka polskiego">
                <button class="active" type="button" aria-current="page" onclick="loadSection('Lektury', 'polski_lektury.json', this)">Lektury</button>
                <button type="button" onclick="loadSection('Gramatyka', 'gramatyka.json', this)">Gramatyka</button>
                <button type="button" onclick="loadSection('Pisanie', 'polski_pisanie.json', this)">Pisanie</button>
                <button type="button" onclick="loadSection('Ortografia', 'polski_ortografia.json', this)">Ortografia</button>
                <button type="button" onclick="loadSection('Interpunkcja', 'polski_interpunkcja.json', this)">Interpunkcja</button>
                <button type="button" onclick="loadSection('Środki stylistyczne', 'polski_srodki.json', this)">Środki stylistyczne</button>
                <button type="button" onclick="loadSection('Rozprawka', 'polski_rozprawka.json', this)">Rozprawka</button>
                <button type="button" onclick="loadSection('Charakterystyka', 'polski_charakterystyka.json', this)">Charakterystyka</button>
                <button type="button" onclick="loadSection('Opowiadanie', 'polski_opowiadanie.json', this)">Opowiadanie</button>
                <button type="button" onclick="loadSection('Poezja', 'polski_poezja.json', this)">Poezja</button>
                <button type="button" onclick="loadSection('Epoki literackie', 'polski_epoki.json', this)">Epoki literackie</button>
                <button type="button" onclick="loadSection('Analiza tekstu', 'polski_analiza.json', this)">Analiza tekstu</button>
            </nav>
        </aside>

        <main class="main">
            <section class="book-shell">
                <div class="chapter-tabs" id="chapterTabs" aria-label="Zakładki rozdziałów"></div>
                <div class="content" id="content" aria-live="polite"><h2>Ładowanie...</h2></div>
            </section>
        </main>
    </div>

    <script>
        const content = document.getElementById("content");
        const chapterTabs = document.getElementById("chapterTabs");
        const languageToggle = document.querySelector(".language-toggle");
        const languageKey = "sd-lang";
        const chapterSets = {
            "Lektury": ["Epopeja", "Dramat", "Powieść", "Poezja", "Nowela"],
            "Gramatyka": ["Części mowy", "Składnia", "Fleksja", "Słowotwórstwo", "Związki"],
            "Pisanie": ["Rozprawka", "Charakterystyka", "Opowiadanie", "Streszczenie", "Opis"],
            "Ortografia": ["Ó/U", "Rz/Ż", "Ch/H", "Nie z czasownikiem", "Wielka litera"],
            "default": ["Epopeja", "Dramat", "Powieść", "Poezja", "Nowela"]
        };

        function applyLanguage(language) {
            const selected = language === "en" ? "en" : "pl";
            document.documentElement.lang = selected;
            languageToggle.setAttribute("aria-label", selected === "pl" ? "Switch to English" : "Przełącz na polski");
            localStorage.setItem(languageKey, selected);
            localStorage.setItem("studydocs-language", selected);
        }

        function setActiveButton(button) {
            document.querySelectorAll(".menu button").forEach((btn) => {
                btn.classList.remove("active");
                btn.removeAttribute("aria-current");
            });
            if (button) {
                button.classList.add("active");
                button.setAttribute("aria-current", "page");
            }
        }

        function renderTabs(title) {
            const tabs = chapterSets[title] || chapterSets.default;
            chapterTabs.innerHTML = tabs.map((tab, index) => `<button class="chapter-tab${index === 0 ? " active" : ""}" type="button" data-index="${index}">${tab}</button>`).join("");
        }

        chapterTabs.addEventListener("click", (event) => {
            const tab = event.target.closest(".chapter-tab");
            if (!tab) return;
            chapterTabs.querySelectorAll(".chapter-tab").forEach((item) => item.classList.remove("active"));
            tab.classList.add("active");
            const lessons = content.querySelectorAll(".lesson");
            const lesson = lessons[Math.min(Number(tab.dataset.index), Math.max(lessons.length - 1, 0))];
            if (lesson) lesson.scrollIntoView({ behavior: "smooth", block: "start" });
        });

        languageToggle.addEventListener("click", () => applyLanguage(document.documentElement.lang === "pl" ? "en" : "pl"));
        applyLanguage(localStorage.getItem(languageKey) || localStorage.getItem("studydocs-language") || "pl");

        async function loadSection(title, jsonFile, button) {
            setActiveButton(button);
            renderTabs(title);
            content.innerHTML = `<h2>${title}</h2><p class="loading">Ładowanie materiałów...</p>`;

            try {
                const response = await fetch(jsonFile);
                if (!response.ok) throw new Error("Nie udało się załadować danych");
                const course = await response.json();
                let html = `<h2>${title}</h2><p class="intro">Materiały z działu <b>${title}</b>: najważniejsze pojęcia, zasady i przykłady w jednym miejscu.</p><div class="lesson-flow">`;
                course.forEach((section) => {
                    html += `<article class="lesson"><span class="tag">${section.tag}</span><h3>${section.title}</h3><p>${section.text}</p><ul>${section.points.map((point) => `<li>${point}</li>`).join("")}</ul><div class="example">${section.example}</div></article>`;
                });
                content.innerHTML = `${html}</div>`;
            } catch (error) {
                content.innerHTML = `<h2>${title}</h2><p class="error">Błąd ładowania danych lub plik nie istnieje.</p>`;
            }
        }

        loadSection("Lektury", "polski_lektury.json", document.querySelector(".menu button.active"));
    </script>
</body>

</html>
