<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polski - StudyDocs</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0b0b0f, #171717, #000);
            color: white;
            display: flex;
        }

        .sidebar {
            width: 300px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(14px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
        }

        .back {
            display: block;
            margin-bottom: 25px;
            color: #c7d2fe;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .sidebar h1 {
            font-size: 1.7rem;
            margin-bottom: 25px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu button {
            text-align: left;
            padding: 14px 16px;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu button:hover {
            background: rgba(255, 255, 255, 0.16);
            transform: translateX(4px);
        }

        .menu button.active {
            background: #6366f1;
        }

        .main {
            flex: 1;
            padding: 60px;
            overflow-y: auto;
        }

        .card {
            max-width: 950px;
            padding: 45px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
        }

        h2 {
            font-size: 2.4rem;
            margin-top: 0;
            margin-bottom: 12px;
        }

        .intro {
            color: #d4d4d4;
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 35px;
        }

        .lesson {
            margin-top: 28px;
            padding: 26px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .lesson h3 {
            margin-top: 0;
            font-size: 1.35rem;
        }

        .lesson p {
            color: #d6d6d6;
            line-height: 1.8;
        }

        ul {
            color: #d6d6d6;
            line-height: 1.9;
            padding-left: 22px;
        }

        .example {
            margin-top: 16px;
            padding: 16px;
            border-left: 4px solid #6366f1;
            background: rgba(99, 102, 241, 0.13);
            border-radius: 12px;
            color: #eeeeee;
            line-height: 1.7;
        }

        .tag {
            display: inline-block;
            margin-bottom: 14px;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(99, 102, 241, 0.22);
            color: #c7d2fe;
            font-size: 0.85rem;
            font-weight: 600;
        }

        @media (max-width: 800px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: auto;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                padding: 20px;
                position: sticky;
                top: 0;
                z-index: 100;
            }

            .sidebar h1 {
                font-size: 1.4rem;
                margin-bottom: 15px;
            }

            .menu {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: 10px;
                -webkit-overflow-scrolling: touch;
            }

            .menu button {
                white-space: nowrap;
                padding: 10px 16px;
            }

            .main {
                padding: 20px;
            }

            .card {
                padding: 25px;
                border-radius: 20px;
            }

            h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <a class="back" href="../subjects.html">← Wróć</a>

        <h1>Polski</h1>

        <nav class="menu">
            <button class="active" onclick="loadSection('Lektury', 'polski_lektury.json', this)">Lektury</button>
            <button onclick="loadSection('Gramatyka', 'gramatyka.json', this)">Gramatyka</button>
            <button onclick="loadSection('Pisanie', 'polski_pisanie.json', this)">Pisanie</button>
            <button onclick="loadSection('Ortografia', 'polski_ortografia.json', this)">Ortografia</button>
            <button onclick="loadSection('Interpunkcja', 'polski_interpunkcja.json', this)">Interpunkcja</button>
            <button onclick="loadSection('Środki stylistyczne', 'polski_srodki.json', this)">Środki stylistyczne</button>
            <button onclick="loadSection('Rozprawka', 'polski_rozprawka.json', this)">Rozprawka</button>
            <button onclick="loadSection('Charakterystyka', 'polski_charakterystyka.json', this)">Charakterystyka</button>
            <button onclick="loadSection('Opowiadanie', 'polski_opowiadanie.json', this)">Opowiadanie</button>
            <button onclick="loadSection('Poezja', 'polski_poezja.json', this)">Poezja</button>
            <button onclick="loadSection('Epoki literackie', 'polski_epoki.json', this)">Epoki literackie</button>
            <button onclick="loadSection('Analiza tekstu', 'polski_analiza.json', this)">Analiza tekstu</button>
        </nav>
    </aside>

    <main class="main">
        <section class="card" id="content">
            <h2>Ładowanie...</h2>
        </section>
    </main>

    <script>
        const content = document.getElementById("content");

        function setActiveButton(button) {
            const buttons = document.querySelectorAll(".menu button");

            buttons.forEach(btn => {
                btn.classList.remove("active");
            });

            if (button) {
                button.classList.add("active");
            }
        }

        async function loadSection(title, jsonFile, button) {
            setActiveButton(button);

            content.innerHTML = `
                <h2>${title}</h2>
                <p class="intro">Ładowanie materiałów...</p>
            `;

            try {
                const response = await fetch(jsonFile);
                if (!response.ok) throw new Error("Nie udało się załadować danych");
                const course = await response.json();

                let html = `
                    <h2>${title}</h2>
                    <p class="intro">
                        Szczegółowe materiały i zasady z działu: <b>${title}</b>. Znajdziesz tutaj kompleksowe objaśnienia i przykłady.
                    </p>
                `;

                course.forEach(section => {
                    html += `
                        <article class="lesson">
                            <span class="tag">${section.tag}</span>
                            <h3>${section.title}</h3>
                            <p>${section.text}</p>

                            <ul>
                                ${section.points.map(point => `<li>${point}</li>`).join("")}
                            </ul>

                            <div class="example">
                                ${section.example}
                            </div>
                        </article>
                    `;
                });

                content.innerHTML = html;
            } catch (error) {
                content.innerHTML = `
                    <h2>${title}</h2>
                    <p class="intro">Błąd ładowania danych lub plik nie istnieje.</p>
                `;
            }
        }

        loadSection('Lektury', 'polski_lektury.json', document.querySelector(".menu button.active"));
    </script>

</body>

</html>
